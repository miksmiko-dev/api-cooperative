version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nestjs_mysql
    restart: unless-stopped
    ports:
      - '3307:3306' # Changed to 3307
    environment:
      MYSQL_ROOT_PASSWORD: password # Root user password
      MYSQL_DATABASE: cooperative
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
    driver: local
